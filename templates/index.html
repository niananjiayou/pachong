<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京东评论爬虫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-stop {
            background: #e74c3c;
            color: white;
        }
        
        .btn-stop:hover {
            background: #c0392b;
        }
        
        .btn-stop:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .logs-container {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        
        .logs-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        #logs {
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #333;
            background: white;
            padding: 10px;
            border-radius: 3px;
        }
        
        .log-item {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #ddd;
            padding-left: 10px;
        }
        
        .log-info {
            border-left-color: #3498db;
            color: #3498db;
        }
        
        .log-error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }
        
        .log-success {
            border-left-color: #27ae60;
            color: #27ae60;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .status.running {
            color: #f39c12;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕷️ 京东评论爬虫</h1>
        
        <div class="form-group">
            <label for="productId">商品 ID 或链接：</label>
            <input 
                type="text" 
                id="productId" 
                placeholder="输入京东商品ID或完整链接"
                value=""
            >
        </div>
        
        <div class="button-group">
            <button class="btn-start" onclick="startCrawl()">开始爬取</button>
            <button class="btn-stop" id="stopBtn" onclick="stopCrawl()" disabled>停止爬虫</button>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="logs-container">
            <div class="logs-title">📋 实时日志：</div>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let isCrawling = false;

        async function startCrawl() {
            const productId = document.getElementById('productId').value.trim();
            
            if (!productId) {
                alert('请输入商品ID或链接！');
                return;
            }

            isCrawling = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').textContent = '⏳ 爬虫运行中...';
            document.getElementById('status').className = 'status running';
            clearLogs();

            try {
                const response = await fetch('/start_crawl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_id: productId,
                        browser_type: 'edge',
                        max_pages: 50
                    })
                });

                if (!response.ok) {
                    addLog('启动爬虫失败：' + response.statusText, 'error');
                    isCrawling = false;
                    return;
                }

                connectLogStream();
            } catch (error) {
                addLog('错误：' + error.message, 'error');
                isCrawling = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        function connectLogStream() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/log_stream');

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.message === 'heartbeat') {
                        return;
                    }
                    
                    if (data.message === '---CRAWL_TASK_END---') {
                        addLog('✅ 爬取任务完成！', 'success');
                        isCrawling = false;
                        document.getElementById('stopBtn').disabled = true;
                        document.getElementById('status').textContent = '✅ 爬虫已完成';
                        document.getElementById('status').className = 'status';
                        eventSource.close();
                        return;
                    }
                    
                    addLog(data.message, data.level);
                } catch (e) {
                    console.error('解析日志失败:', e);
                }
            };

            eventSource.onerror = (error) => {
                console.error('SSE 连接错误:', error);
                if (isCrawling) {
                    addLog('❌ 连接断开，爬虫可能已停止', 'error');
                }
                isCrawling = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('status').textContent = '❌ 连接断开';
                document.getElementById('status').className = 'status';
                eventSource.close();
            };
        }

        async function stopCrawl() {
            try {
                const response = await fetch('/stop_crawl', {
                    method: 'POST'
                });

                if (response.ok) {
                    addLog('⏹️ 停止信号已发送', 'info');
                } else {
                    addLog('停止爬虫失败', 'error');
                }
            } catch (error) {
                addLog('错误：' + error.message, 'error');
            }
            
            isCrawling = false;
            document.getElementById('stopBtn').disabled = true;
            if (eventSource) {
                eventSource.close();
            }
        }

        function addLog(message, level = 'info') {
            const logsDiv = document.getElementById('logs');
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${level}`;
            
            const timestamp = new Date().toLocaleTimeString();
            logItem.textContent = `[${timestamp}] ${message}`;
            
            logsDiv.appendChild(logItem);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
    </script>
</body>
</html>
