
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京东评论爬虫</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 可以根据需要添加自定义样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">京东评论爬虫</h1>

        <div class="mb-4">
            <label for="productId" class="block text-gray-700 text-sm font-semibold mb-2">
                请输入京东商品ID或链接:
            </label>
            <input
                type="text"
                id="productId"
                class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                placeholder="例如: 10127955410850 或 https://item.jd.com/10127955410850.html"
            />
        </div>

        <button
            id="startCrawlButton"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out"
        >
            开始爬取
        </button>

        <div id="statusMessage" class="mt-6 p-4 rounded-md text-sm text-center bg-gray-100 text-gray-600">
            等待您的操作...
        </div>

        <div id="errorMessage" class="mt-4 p-4 rounded-md text-sm text-center bg-red-100 text-red-700 hidden">
            <!-- 错误信息将显示在这里 -->
        </div>
    </div>

<script>
    document.getElementById('startCrawlButton').addEventListener('click', function() {
        const productIdInput = document.getElementById('productId');
        const statusMessage = document.getElementById('statusMessage');
        const errorMessage = document.getElementById('errorMessage');
        const startCrawlButton = this; // 获取按钮本身以便禁用/启用
        const productId = productIdInput.value.trim();

        errorMessage.classList.add('hidden'); // 隐藏之前的错误信息

        if (!productId) {
            errorMessage.textContent = "请输入商品ID或链接！";
            errorMessage.classList.remove('hidden');
            return;
        }

        statusMessage.textContent = `正在爬取商品ID/链接: ${productId} ... 请稍候。`;
        statusMessage.classList.remove('bg-gray-100', 'text-gray-600', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
        statusMessage.classList.add('bg-yellow-100', 'text-yellow-700');
        startCrawlButton.disabled = true; // 禁用按钮防止重复点击

        // 发送实际的爬取请求到后端 Flask 路由
        fetch('/crawl', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ productId: productId }) // 将商品ID作为 JSON 数据发送
        })
        .then(response => response.json()) // 解析 JSON 响应
        .then(data => {
            if (data.status === 'success' || data.message.includes('爬取完成')) { // 假设后端返回 status 字段或 message 包含"爬取完成"
                statusMessage.textContent = `爬取完成！商品ID/链接: ${productId} 的评论数据已处理。`;
                statusMessage.classList.remove('bg-yellow-100', 'text-yellow-700', 'bg-red-100', 'text-red-700');
                statusMessage.classList.add('bg-green-100', 'text-green-700');
            } else {
                errorMessage.textContent = `爬取失败！${data.message || '发生未知错误。'}`;
                errorMessage.classList.remove('hidden');
                statusMessage.textContent = `请重试或检查输入。`;
                statusMessage.classList.remove('bg-yellow-100', 'text-yellow-700', 'bg-green-100', 'text-green-700');
                statusMessage.classList.add('bg-red-100', 'text-red-700');
            }
        })
        .catch(error => {
            console.error('Error during fetch:', error);
            errorMessage.textContent = `请求失败：${error.message || '网络或服务器连接错误。'}`;
            errorMessage.classList.remove('hidden');
            statusMessage.textContent = `请重试或检查输入。`;
            statusMessage.classList.remove('bg-yellow-100', 'text-yellow-700', 'bg-green-100', 'text-green-700');
            statusMessage.classList.add('bg-red-100', 'text-red-700');
        })
        .finally(() => {
            startCrawlButton.disabled = false; // 重新启用按钮
            productIdInput.value = ''; // 清空输入框
        });
    });
</script>
</body>
</html>
